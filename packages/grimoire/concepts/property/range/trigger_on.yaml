title: { en: Trigger on, pt: Aciona em }
description:
  {
    en: 'Which side turns an `interval_kind: threshold` ON — the one irreducible bit a hysteretic trigger needs (min/max alone give the two edges, not which region is ON). `below` ⇒ ON when the reading is below `min`, OFF once above `max` (a heat demand: on cold, off warm). `above` ⇒ ON above `max`, OFF below `min` (a cool demand / over-limit trip). Between the edges the boolean HOLDS its prior state — the deadband `[min,max]` is what makes it stateful. Its presence is what derives `interval_kind: threshold`. Borrowed from HA numeric_state (above/below).',
  }
schema: { type: string, enum: [above, below] }
