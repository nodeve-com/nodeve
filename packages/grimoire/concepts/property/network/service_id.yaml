title: { en: Service }
description:
  en: "Slug of a services instance on the ingested device the adapter dials (the consumer resolves it against that device's own services). A slug value but a distinct key — it names a relationship, not this object's own id."
body:
  en: >
    Reference to the OFFERED service an adapter ingests through: the `identity.slug` of a `services` instance on the metered device (`ingest.catalog_item`). An intra-catalog pointer resolved against that device's own `services` — a plain slug, NOT a `column.references` catalog FK (mirror of `network_interface_id`). The service owns the surface (protocol, port, NIC binding); the adapter never restates it.
schema: { type: string, minLength: 1 }
