# Reference to the NIC a service binds on: the `identity.slug` of a `network_interfaces` instance of
# THIS node. An intra-site pointer — the target is a site instance, not a catalog entry (network
# interfaces have no agnostic rows), so it's a plain slug the runtime resolves against the node's
# own interfaces, NOT a `column.references` catalog FK (mirror of `link`). Coarser than
# `ip_address_id`: bind to the interface (all its L3 addresses) rather than one address.
title: { en: Network interface }
description:
  en: "Slug of a network_interfaces instance on this node the service binds to (the runtime resolves it against the node's own interfaces). A slug value but a distinct key — it names a relationship, not this object's own id."
schema: { type: string, minLength: 1 }
