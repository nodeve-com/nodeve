title: { en: Sentinel }
description: { en: "A reserved raw value with a categorical meaning instead of a number (M4-ATX timers use 0xffff for never). raw == reading ⇒ emit the meaning slug rather than scaling; a writer maps back. The reserved reading is named raw, not value." }
schema:
  type: object
  additionalProperties: false
  required: [raw, meaning]
  properties:
    raw: { type: integer, minimum: 0 }
    meaning: { type: string, pattern: '^[a-z][a-z0-9_]*$' }
