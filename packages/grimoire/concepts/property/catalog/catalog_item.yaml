title: { en: Catalog item, pt: Item de catálogo }
body:
  en: >
    A reference to ONE catalog entry by its identity — `archetype_id` (the class) + `slug` (the globally-unique entry id, catalog.generated.json's key). THE lookup shape every cross-tree reference uses (a site device names its hardware this way); never a filing tree path. A pure foreign key — nothing but the pointer. On-bus name shortening is a CATALOG fact — a feature's own `identity.slug` (e.g. `ac_phase_three_point → ac`), not a site overlay on this pointer.
schema:
  type: object
  required: [archetype_id, slug]
  properties:
    archetype_id: { type: string, minLength: 1 }
    slug: { type: string, minLength: 1 }
  additionalProperties: false
