# Reference to ONE interval of the referenced feature's property — that interval's own
# `identity.slug` handle (out, out_daily, daily, continuous, ...). The third `_id` coordinate of the
# interval_item pointer: (feature_id, property_id | quantity_kind, interval_id) is the SAME by-slug
# triple {feature, property, interval} conditions use. A measurand link uses it to name WHICH
# measurable channel of a kind a register reads. `_id` = the target's slug (like feature_id); unique
# within the property's `intervals` array (bake-validated, not draft-07).
title: { en: Interval ID }
description:
  en: "Slug of one interval of the referenced feature's property — the third coordinate of an interval pointer, pairs with feature_id. A slug value naming a relationship, not this object's own id."
schema: { type: string, minLength: 1 }
