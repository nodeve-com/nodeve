title: { en: Unit, pt: Unidade }
description:
  en: Non-SI unit override of a published/stated value — stated only when the value isn't in its quantity kind's canonical SI/coherent unit (kW vs W, °C vs K). Omit ⇒ canonical SI unit.
  pt: Unidade não-SI de um valor publicado/declarado — declarada apenas quando o valor não está na unidade SI canônica do seu tipo de grandeza. Omitir ⇒ unidade SI canônica.
schema: { type: string, minLength: 1 }
