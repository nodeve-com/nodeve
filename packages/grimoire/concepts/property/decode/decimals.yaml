title: { en: Resolved decimals, pt: Casas decimais resolvidas }
description:
  en: Decimal places the sensor actually resolves; the published value is rounded to it. Source-side honesty — decoding leaks precision the sensor never measured (nearest float32 to 1.675 is 1.6749999523162842; a scale like 0.1 adds its own IEEE-754 tail). Omit only when scale already lands on the real resolution.
  pt: Casas decimais que o sensor realmente resolve; o valor publicado é arredondado para elas. Omita apenas quando a escala já chega à resolução real.
schema: { type: integer, minimum: 0 }
