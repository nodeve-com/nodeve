title: { en: Equals }
description:
  en: "The value a gated `setting` must hold for the band to apply — a scalar matching the setting's
    type as declared in the device's `settings_schema` (a grid_region enum member, a mode slug, a
    boolean flag). One value per gate; a band valid for several values is several bands (OR = separate
    bands)."
schema: { type: [string, number, boolean] }
