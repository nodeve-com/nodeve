title: { en: MPPT window }
description: { en: "The MPPT tracking window, in volts (min = the floor where the converter parks a string once engaged but light is too low to track a real MPP; max = top of the hunt range). A property of the TRACKER, not of any single string — may be narrower than a string's rated voltage envelope. A bare range, not a voltage nominal-range: an MPP window has no rated point to nominate." }
schema: { type: object }
