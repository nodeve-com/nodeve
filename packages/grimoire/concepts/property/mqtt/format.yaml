title: { en: Wire format }
description: { en: "Wire layout for decoded points. grouped (default when absent): one retained JSON object per group at <topic_prefix>/<group> = {ts, mono, seq, ...values}. per_value: one retained bare-value topic per point at <topic_prefix>/<group>/<key> (no envelope) — the flat layout legacy per-value subscribers expect. Medium-neutral so any decoder-to-MQTT medium can offer either contract." }
schema: { type: string, enum: [grouped, per_value] }
