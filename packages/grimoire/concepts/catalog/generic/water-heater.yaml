body:
  en: >
    Generic electric water heater (termoacumulador) — the `water_heater` archetype: the `appliance` base composed with the required `resistive_element` atom (the heat source). NO humidity_control (that's the dehumidifier) and no thermostat field — the unit's own thermostat is internal; HA only switches the element and reads its draw. The surplus-loop cycle tuning and priority are control-loop SITE data in ha-config, not catalog model facts. A deployment refits the per-unit fitted draw bands from its measured draw; the resistive_element supply is the datasheet figure (active_power rated at the supply voltage — with resistance_ohms a consumer can compute true output at the actual voltage).
product:
  model: water-heater
archetype_id: water_heater

# The AC phase the element runs on — the voltage plus its nameplate DRAW (active_power, rated at that
# voltage). The connection is the archetype's, not the element's. With resistance a consumer computes
# true output at the actual voltage.
ac_phase:
  feature_spec:
    combined:
      voltage:
        intervals:
          - interval: { value: 230, severity: nominal } # Portugal single phase
      frequency:
        intervals:
          - interval: { value: 50, severity: nominal }
      active_power:
        intervals:
          - interval: { value: 1500, severity: nominal } # nameplate draw, rated at supply voltage
      # Element resistance (Ω) — P = V²/R ⇒ 230²/1500; lets a consumer compute true output off-nominal.
      # On the ac_phase itself (where electrical_quantity puts resistance), not a separate slot.
      resistance:
        intervals:
          - interval: { value: 35.3, severity: nominal }

# Pinned identity — the stable reference (code = short-code minted at creation); survives re-filing/renames.
identity:
  slug: water_heater
  code: QXM34AJD
