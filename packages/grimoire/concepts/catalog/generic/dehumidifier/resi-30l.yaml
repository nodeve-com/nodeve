# Generic ~30 L/day residential dehumidifier — a nominal class stand-in (no real make/model). A
# deployment references it for the rough capacity class, then supplies the unit's fitted
# Fan/Compressor draw bands and hygrostat config as SITE data (ha-config). Fill compressor /
# refrigeration / humidity_control only when modeling a real unit — never fabricate.
product:
  model: resi-30l

# Moisture output as a flow rate (QUDT VolumeFlowRate); L/day is a non-SI override (canonical m³/s).
dehumidification:
  feature_spec:
    combined:
      volume_flow_rate:
        intervals:
          - interval: { nominal: 30, unit: L/day } # rated water extraction

# Pinned identity — the stable reference (code = short-code minted at creation); survives re-filing/renames.
identity:
  slug: resi_30l
  code: FD7Y1Z4Z
