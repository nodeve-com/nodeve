  # Categorical/enumerated observables of the WHOLE box — their feature-of-interest is the inverter
  # root itself (a run mode / fault set aggregates across PV, grid, BMS, temp; no sub-feature owns
  # them). They link `feature_id: inverter` + a category field (`state` / `fault`) instead of a
  # quantity_kind, since they're enum-valued, not VIM-ranged. The slug property stays inline here.
  modbus_decodes:
    # Inverter run state (foxess inverter_state) — the device's status GROUP, words 1/2/3 at
    # 39063/39064/39065, reported as a SET — EVERY set bit across the group, not collapsed to one.
    # Bits stay in the group the device puts them in — the
    # word1-bit6 fault flag is reported HERE, where it physically lives, not relocated onto the
    # separate fault_code group (39067–69). `empty: unknown` when no bit is set. word2 (39064) is
    # read as part of the group; its bits aren't identified yet. labels[i] maps addresses[i].
    - kind: flags
      feature_id: inverter
      state: run_state
      addresses: [39063, 39064, 39065]
      empty: unknown
      join: '; '
      labels:
        - [standby, null, on_grid, null, null, null, fault] # 39063 word1: bit0 standby, bit2 on_grid, bit6 fault
        - [] # 39064 word2: in the group, bits not yet identified
        - [off_grid] # 39065 word3: bit0 off_grid
    # Inverter fault code (foxess inverter_fault_code). Collect every set bit's slug across all
    # three words and join; none set → `none`. labels[i] is the bit map for addresses[i].
    - kind: flags
      feature_id: inverter
      fault: fault_code
      addresses: [39067, 39068, 39069]
      empty: none
      join: '; '
      labels:
        - [
            fault_pv_voltage_over,
            fault_dc_arc,
            fault_pv_string_connection_reverse,
            null,
            null,
            null,
            null,
            fault_grid_lost,
            fault_grid_voltage,
            null,
            null,
            fault_grid_frequency,
            null,
            null,
            fault_output_current_over,
            fault_output_dc_current_over,
          ]
        - [
            fault_residual_current_consistency,
            fault_ground_connection,
            fault_insulation_resistance_low,
            fault_inverter_temperature_over,
            null,
            null,
            null,
            null,
            null,
            fault_energy_storage_equipment_abnormal,
            fault_island_isolated,
            null,
            null,
            null,
            fault_off_grid_output_overload,
            null,
          ]
        - [
            null,
            null,
            null,
            fault_fan_external,
            fault_energy_storage_connection_reverse,
            null,
            null,
            null,
            null,
            fault_meter_lost,
            fault_bms_lost,
            null,
