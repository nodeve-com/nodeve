# FoxESS PS-10.0-SH (box label H3 SMART), SN 60P11030588M005 — one catalog entry for the whole
# box: its electrical envelope (the `inverter` archetype: two ac-ports + pv-input) AND how it
# is talked to (its modbus slot). This single file replaces the former split between the
# inverter-model spec sheet and the modbus-device register map. `manufacturer: FoxESS` is
# inherited from ../_defaults.yaml; `archetype: inverter` from ./_defaults.yaml.
identity:
  slug: foxess_h3_ps10sh
  code: S2P331EC

product:
  model: H3-10.0-Smart # box reports Inv.H3_SMART

# Mirrors the inverter FEATURE tree (concepts/archetypes/inverter.ts): each feature status carries that
# feature's spec values; a 'per-entry' part (phase, string) supplies its `count` and is filled ONCE,
# applying to every expanded instance. `measurement:` is a map statusED BY quantity_kind that realizes
# the offered measurands with concrete VIM ranges — validated against the projected tree (offered
# kinds only, intervals within envelope). One kind per status (range-multiplicity lives in `ranges`).

# Commissioning setting — the grid region the box is wired for (enumeration/grid_region members;
# each carries its nominal mains voltage + frequency). ONE knob gates the nominal bands below via
# `condition: [{ setting: grid_region, equals: <member> }]`; the site fixes it once at install.
settings_schema:
  type: object
  required: [grid_region]
  properties:
    grid_region: { enum: [eu_230v_50hz, br_220v_60hz] }
  additionalProperties: false

# The inverter's OWN grid-tie AC OUTPUT port (foxess grid_voltage / inv_current / inv_power) — was
# mislabeled `ac_phase_three_grid`; the real grid CT is the separate feature below. `combined` = the
# whole AC-side total, `default` = the per-phase template.
ac_phase_three_out:
  identity:
    slug: ac_out
  feature_spec:
    # combined: the three legs as ONE — the box's whole-AC-side total, NOT 3×per-phase
    # (it isn't: a 10 kW box can't sustain 3×3.3 kW). Authored because it's not derivable.
    combined:
      # Lifetime + daily throughput at the AC port (foxess total_yield / input_energy). ONE
      # active_energy column; the four channels are measurable intervals keyed by flow_direction
      # (out = yield, in = input) + period (absent = lifetime, daily = *_today).
      active_energy:
        intervals:
          - interval: {
                interval_kind: measurable,
                flow_direction: out,
                min: 0,
                unit: kWh,
                resolution: 0.01,
              } # total_yield
          - interval: {
                interval_kind: measurable,
                flow_direction: out,
                period: daily,
                min: 0,
                unit: kWh,
                resolution: 0.01,
              } # total_yield_today
          - interval: {
                interval_kind: measurable,
                flow_direction: in,
                min: 0,
                unit: kWh,
                resolution: 0.01,
              } # input_energy
          - interval: {
                interval_kind: measurable,
                flow_direction: in,
                period: daily,
                min: 0,
                unit: kWh,
                resolution: 0.01,
              } # input_energy_today
      reactive_power:
        intervals:
          - interval:
              { interval_kind: measurable, min: -11, max: 11, unit: kvar, resolution: 0.001 }
      active_power:
        # power is throughput, not a setpoint — no `nominal`; only the limits it's rated to carry.
        # With no nominal the symmetric export/import rows collapse to one signed range per tier.
        # Tiers classify by AXES: continuous = full capacity gated by the enclosure's `continuous`
        # thermal band; short_term "peak" = a duration; derate = continuous gated by `intermittent`.
        intervals:
          - interval: { rating: continuous, min: -11000, max: 10000 } # full capacity, either direction
            condition:
              # Holds while the enclosure is in its `continuous` (≤45 °C) thermal band.
              - interval_item: { feature: enclosure, property: temperature, interval: continuous }
              # TODO(altitude-derate): full 10 kW export only below 2000 m. Needs a spec-carrying
              # altitude band to point at — pending a generic altitude/elevation feature (the site
              # supplies the install altitude; geo-fence is undesigned). Deferred, not dropped.
          # short-term peak: sustained ≤30 s, the device self-protects beyond.
          - interval: { rating: short_term, min: -12000, max: 11000, duration: 30 }
          - interval: { rating: continuous, min: -10000, max: 9000 } # thermal derate 45–60 °C
            condition:
              - interval_item: { feature: enclosure, property: temperature, interval: intermittent }
    # default: KIND-keyed base every part of that kind starts from — the emit fills part.<name> as
    # default.<kind> overlaid by any authored part.<name> patch. The power block below is PER-PHASE.
    default:
      ac_phase:
        voltage:
          # 220/230 are a commissioning choice, not two simultaneous limits: each is gated on the
          # single-valued grid_region setting, so the site sets it once and one interval resolves.
          # A lone `nominal` (no min/max) IS the nameplate rating — interval_kind: rating derives from
          # it, slug auto-derives from the gate (nominal_br_220v_60hz / nominal_eu_230v_50hz).
          intervals:
            - interval: { nominal: 220 }
              condition: [{ setting: grid_region, equals: br_220v_60hz }]
            - interval: { nominal: 230 }
              condition: [{ setting: grid_region, equals: eu_230v_50hz }]
            - interval: { interval_kind: measurable, min: 0, max: 250, resolution: 0.1 }
        frequency:
          # nominal + tolerance is still a nominal (a spread AROUND the value, not a min/max envelope).
          intervals:
            - interval: { nominal: 50, tolerance: 0.05 }
              condition: [{ setting: grid_region, equals: eu_230v_50hz }]
            - interval: { nominal: 60, tolerance: 0.05 }
              condition: [{ setting: grid_region, equals: br_220v_60hz }]
        current:
          intervals:
            - interval: { rating: continuous, max: 15.2 }
            - interval: { rating: survival, max: 16.7 }
            - interval: { rating: protection_required, max: 25 }
        active_power:
          intervals:
            - interval: { rating: continuous, nominal: 3333, max: 3666 }
              condition:
                - interval_item: { feature: enclosure, property: temperature, interval: continuous }
                # TODO(altitude-derate): per-phase full power only below 2000 m — same deferred
                # altitude band as the combined total above.
            - interval: { interval_kind: measurable, min: 0, max: 5, unit: kW }

# The GRID CT / utility meter (foxess grid_ct) — net power at the grid connection point, signed
# (feed-in / export +, grid consumption / import −), plus the directional lifetime + daily energy
# accumulators. This is the metering point (cim:ExternalNetworkInjection / saref4grid:PowerLine),
# distinct from the inverter's own AC output above.
ac_phase_three_grid:
  identity:
    slug: ac_grid
  feature_spec:
    combined:
      # Net grid power, signed: export +, import −. One measurable channel; direction is the sign.
      active_power:
        intervals:
          - interval: { interval_kind: measurable, min: -15, max: 15, unit: kW, resolution: 0.001 }
      # Directional energy — feed-in (export) vs grid-consumption (import), each lifetime + daily. ONE
      # active_energy column; channels are measurable intervals keyed by flow_direction (out = feed-in,
      # in = grid consumption) + period (absent = lifetime, daily = *_today).
      active_energy:
        intervals:
          - interval: {
                interval_kind: measurable,
                flow_direction: out,
                min: 0,
                unit: kWh,
                resolution: 0.01,
              } # feed_in_energy
          - interval: {
                interval_kind: measurable,
                flow_direction: out,
                period: daily,
                min: 0,
                unit: kWh,
                resolution: 0.01,
              } # feed_in_energy_today
          - interval: {
                interval_kind: measurable,
                flow_direction: in,
                min: 0,
                unit: kWh,
                resolution: 0.01,
              } # grid_consumption_energy
          - interval: {
                interval_kind: measurable,
                flow_direction: in,
                period: daily,
                min: 0,
                unit: kWh,
                resolution: 0.01,
              } # grid_consumption_energy_today
    default:
      ac_phase:
        active_power:
          # per-leg net grid power (foxess grid_ct R/S/T), signed like the combined total.
          intervals:
            - interval: { interval_kind: measurable, min: -8, max: 8, unit: kW, resolution: 0.001 }

# feature_spec direction (docs/feature-model.md): `count` is grammar → `concept_settings`; the
# `combined` / `default` / `instances` spec body nests under `feature_spec`.
pv_tracker:
  concept_settings:
    count: 3
  feature_spec:
    # `rating:` is the UNIVERSAL rated-envelope property (operating/survival/startup/protection_required/reference/zone)
    # shared by every archetype; `mode:` is this archetype's OWN operational-state property (mppt,
    # mppt_fullpower) for bands the universal set can't name. Both axes co-occur on one interval. Use
    # `rating:` whenever a universal class fits; reserve `mode:` for the archetype-specific states.
    combined:
      active_power:
        intervals:
          - interval: { rating: survival, max: 20000 }
          - interval: { rating: continuous, max: 18000 }
      # PV generation energy (undirected — one direction): lifetime total (foxess solar_energy_total,
      # register 39601) + daily (foxess solar_energy_today, 39603, period: daily) on one active_energy column.
      active_energy:
        intervals:
          - interval: { interval_kind: measurable, min: 0, unit: kWh, resolution: 0.01 } # lifetime
          - interval: {
                interval_kind: measurable,
                period: daily,
                min: 0,
                unit: kWh,
                resolution: 0.01,
              } # solar_energy_today
    default:
      voltage:
        intervals:
          - interval: { rating: continuous, min: 90, nominal: 620 }
          - interval: { rating: survival, max: 1000 }
          - interval: { rating: startup, min: 140 }
          - interval: { mode: mppt, min: 120, max: 950 }
          - interval: { mode: mppt_fullpower, min: 175, max: 850 }
          - interval: { interval_kind: measurable, min: 0, max: 1000, resolution: 0.1 }
      current:
        intervals:
          - interval: { rating: survival, max: 25 }
          - interval: { rating: continuous, max: 20 }
          - interval: { interval_kind: measurable, min: 0, max: 30, resolution: 0.01 }
      active_power:
        intervals:
          - interval: { rating: continuous, max: 10000 }
    # instances: SPARSE array of per-string overrides, each tagged with its 1-based `ordinal`
    # (the join key), overlaid ROW-level onto `default`: this row replaces only the `continuous`
    # interval (same rating); survival/startup/mppt rows, current and measurable span stay inherited.
    instances:
      - ordinal: 3
        voltage:
          intervals:
            - interval: { rating: continuous, min: 60, nominal: 480 }

# NB export/import at the utility point is the SIGN of ac_phase_three_grid.combined.active_power (the
# grid CT: feed-in +, grid consumption −); the directional lifetime/daily ENERGY is the active_energy
# column's flow_direction/period measurable intervals. The inverter's own throughput lives on
# ac_phase_three_out (active_power tiers + active_energy out/in channels), not duplicated.

ac_phase_three_eps: # separate EPS port — export only; its own per-phase telemetry
  identity:
    slug: ac_eps
  feature_spec:
    # combined: the three legs as ONE — the box's whole-EPS-side total, NOT 3×per-phase.
    combined:
      active_power:
        intervals:
          - interval: { rating: continuous, max: 10000 } # rated EPS export, all legs together
    # default: the per-phase values every leg gets — the power block below is PER-PHASE.
    default:
      ac_phase:
        voltage:
          intervals:
            - interval: { rating: continuous, nominal: 230, min: 200, max: 260 }
            - interval: { interval_kind: measurable, min: 0, max: 300, resolution: 0.1 }
        frequency:
          intervals:
            - interval: { nominal: 50 } # lone nominal — nameplate reference
        current:
          intervals:
            - interval: { interval_kind: measurable, min: 0, max: 50, resolution: 0.01 }
        active_power:
          intervals:
            - interval: {
                  interval_kind: measurable,
                  min: -3.3,
                  max: 3.3,
                  unit: kW,
                  resolution: 0.001,
                } # unit override — canonical is W

ac_phase_three_load: # household load the box meters (foxess load_power) — a concrete feature-of-interest
  identity:
    slug: ac_load
  # whole-house active power, downstream of the box's own AC port; it's the inverter's view of the
  # home, so it lives on this entry. `combined` is the three-leg total, `default.ac_phase` the
  # per-leg reading every leg gets (foxess load_power_r/s/t).
  feature_spec:
    combined:
      active_power:
        intervals:
          - interval: { interval_kind: measurable, min: 0, max: 15, unit: kW, resolution: 0.001 }
      # Household load energy (undirected): lifetime (foxess load_power total, 39629) + daily
      # (load_energy_today, 39631, period: daily) on one active_energy column.
      active_energy:
        intervals:
          - interval: { interval_kind: measurable, min: 0, unit: kWh, resolution: 0.01 } # lifetime
          - interval: {
                interval_kind: measurable,
                period: daily,
                min: 0,
                unit: kWh,
                resolution: 0.01,
              } # load_energy_today
    default:
      ac_phase:
        active_power:
          # Signed like the foxess entity (validate −100..100): a leg can read negative when the
          # box back-feeds through it. Range is the leg's plausible envelope, not a rating.
          intervals:
            - interval: { interval_kind: measurable, min: -5, max: 15, unit: kW, resolution: 0.001 }

enclosure: # internal temperature is the enclosure's — a concrete feature-of-interest, not dangling
  # Partless feature → its columns live under `feature_spec.combined` (the whole).
  feature_spec:
    combined:
      temperature:
        # The thermal ladder continuous ⊂ intermittent ⊂ survival IS the derate anchor set: the
        # grid-power derate points at these tiers' auto-slugs (interval: continuous / intermittent)
        # directly — no custom zone. measurable is what the sensor reads. Numbers in °C (unit
        # override — canonical is K) per interval.
        intervals:
          - interval: { rating: survival, min: -40, max: 80, unit: °C }
          - interval: { rating: intermittent, min: -25, max: 60, unit: °C }
          - interval: { rating: continuous, min: -20, max: 45, unit: °C }
          - interval: { interval_kind: measurable, min: -40, max: 100, unit: °C, resolution: 0.1 }

# Each NIC is one `network_interfaces` archetype instance (is_array): its own identity.slug handle
# plus the network_link datasheet block. The box ships a WiFi radio and a 100 Mb Ethernet port.
network_interfaces:
  - identity: { slug: wlan0 }
    network_link:
      interface_type: ieee80211
  - identity: { slug: eth0 }
    network_link:
      interface_type: ethernet_csmacd
      link_speed: 100

# Services this box OFFERS — the network surfaces a consumer reaches (this device-declaration IS the
# registry). Each binds to a NIC above; the site overlay fills that NIC's address, so the host
# resolves through it. The Modbus-TCP server a polling master reads (modbus_tcp on 502) and the
# built-in web UI (https on 443).
services:
  - identity: { slug: modbus_tcp }
    service_binding:
      service_protocol: modbus_tcp
      network_interface_id: eth0
      port: 502
  - identity: { slug: web_ui }
    service_binding:
      service_protocol: https
      network_interface_id: eth0
      port: 443

# How to TALK to the box: the modbus connectivity medium.
# The box's OWN grid-CT reading (foxess grid_ct, 388xx) IS here now — the inverter meters the utility
# point directly; the separate Chint DTSU666 entry is an independent higher-resolution tap of the same.
# Registers extracted from the foxess_modbus HA integration for Inv.H3_SMART; scope is only the
# registers backing entities we consume today (write/control registers out of scope — see
# docs/solar/inverter.md).
modbus:
  # The reachable surface (modbus_tcp on port 502, its NIC binding) is declared in `services` above —
  # this medium is the DECODE contract (framing + register map), not the network transport.
  modbus_link:
    unit_id: 247 # Modbus slave id (FoxESS H3 AUX default); overridable downstream
    # All H3_SMART data registers are HOLDING. 32-bit values span two registers, high word at
    # the LOWER address (word_order: high_first); 16-bit registers are big-endian (Modbus std).
    register_type: holding
    word_order: high_first
  # PROVENANCE + STATUS (investigated 2026-07, not device-confirmed): both ranges are copied verbatim
  # from the foxess_modbus HA integration's H3_SMART_REGISTERS (inverter_profiles.py, traceable to
  # github.com/nathanmarlor/foxess_modbus discussion #792). NOT our own measurement — treat as SUSPECT,
  # not load-bearing. Neither guards a single register we poll (ours are all 39xxx). Do NOT architect a
  # hard split boundary around these until a live probe confirms the hazard:
  #   mbpoll -m tcp -a 247 -t 4 -r 41001 -c 15 <ip>   # invalid_ranges: exception vs clean?
  #   mbpoll -m tcp -a 247 -t 4 -r 37609 -c 28 <ip>   # individual_read: garbage vs sane?
  # invalid_ranges: all in the 410xx block the upstream doc leaves unspecified. On the SMART the actual
  #   control/write registers live at 46xxx/49xxx — nothing is at 41xxx — so this is defensive padding
  #   around an empty region, likely inert. individual_read_ranges: the real one — overlaps the BMS
  #   battery block (a known FoxESS BMS-passthrough quirk), but dormant until we add battery telemetry.
  modbus_constraints:
    invalid_ranges:
      - range: [41001, 41006]
        note: unspecified 410xx (foxess_modbus copy); unverified, no register we read is near it
      - range: [41012, 41013]
        note: unspecified 410xx (foxess_modbus copy); unverified
      - range: [41015, 41015]
        note: unspecified 410xx (foxess_modbus copy); unverified
    individual_read_ranges:
      - range: [37609, 37620]
        note: battery + BMS telemetry (V, I, SoC, temp, cell temps/mV); unverified, not read today
      - range: [37632, 37636]
        note: BMS energy registers (kWh remaining); unverified, not read today
  # Each register LINKS to a measurand the projected feature tree offers: (feature, ordinal,
  # quantity_kind). The topic is DERIVED from that link downstream — not authored here. `unit`
  # appears ONLY when it isn't the kind's SI/coherent unit (V/A/W/K are SI ⇒ omitted; kW, °C kept).
  modbus_registers:
    # --- Lifetime PV generation (foxess solar_energy_total) ---
    # H3 SMART: unsigned 32-bit counter, high word first, 0.01 kWh/count.
    - {
        feature_id: pv_tracker,
        quantity_kind: active_energy,
        address: 39601,
        type: uint32,
        scale: 0.01,
        decimals: 2,
        unit: kWh,
      } # high word; low 39602
    # --- PV string 1 (foxess pv1_*) ---
    - {
        feature_id: pv_tracker,
        ordinal: 1,
        quantity_kind: voltage,
        address: 39070,
        type: uint16,
        scale: 0.1,
        decimals: 1,
      }
    - {
        feature_id: pv_tracker,
        ordinal: 1,
        quantity_kind: current,
        address: 39071,
        type: uint16,
        scale: 0.01,
        decimals: 2,
      }
    - {
        feature_id: pv_tracker,
        ordinal: 1,
        quantity_kind: active_power,
        address: 39279,
        type: int32,
        scale: 0.001,
        decimals: 3,
        unit: kW,
      } # high word; low 39280
    # --- PV string 2 (foxess pv2_*) ---
    - {
        feature_id: pv_tracker,
        ordinal: 2,
        quantity_kind: voltage,
        address: 39072,
        type: uint16,
        scale: 0.1,
        decimals: 1,
      }
    - {
        feature_id: pv_tracker,
        ordinal: 2,
        quantity_kind: current,
        address: 39073,
        type: uint16,
        scale: 0.01,
        decimals: 2,
      }
    - {
        feature_id: pv_tracker,
        ordinal: 2,
        quantity_kind: active_power,
        address: 39281,
        type: int32,
        scale: 0.001,
        decimals: 3,
        unit: kW,
      } # high word; low 39282
    # --- PV string 3 (foxess pv3_*) — the box's third tracker (ordinal 3 override in feature_spec) ---
    - {
        feature_id: pv_tracker,
        ordinal: 3,
        quantity_kind: voltage,
        address: 39074,
        type: uint16,
        scale: 0.1,
        decimals: 1,
      }
    - {
        feature_id: pv_tracker,
        ordinal: 3,
        quantity_kind: current,
        address: 39075,
        type: uint16,
        scale: 0.01,
        decimals: 2,
      }
    - {
        feature_id: pv_tracker,
        ordinal: 3,
        quantity_kind: active_power,
        address: 39283,
        type: int32,
        scale: 0.001,
        decimals: 3,
        unit: kW,
      } # high word; low 39284
    # --- Inverter AC output, per phase (foxess inv_power_R/S/T → legs L1/L2/L3) ---
    - {
        feature_id: ac_phase_three_out,
        part_id: a,
        quantity_kind: active_power,
        address: 39248,
        type: int32,
        scale: 0.001,
        decimals: 3,
        unit: kW,
      } # high word; low 39249
    - {
        feature_id: ac_phase_three_out,
        part_id: b,
        quantity_kind: active_power,
        address: 39250,
        type: int32,
        scale: 0.001,
        decimals: 3,
        unit: kW,
      } # high word; low 39251
    - {
        feature_id: ac_phase_three_out,
        part_id: c,
        quantity_kind: active_power,
        address: 39252,
        type: int32,
        scale: 0.001,
        decimals: 3,
        unit: kW,
      } # high word; low 39253
    # --- Inverter AC output, per-phase voltage (foxess grid_voltage_R/S/T) ---
    - {
        feature_id: ac_phase_three_out,
        part_id: a,
        quantity_kind: voltage,
        address: 39123,
        type: uint16,
        scale: 0.1,
        decimals: 1,
      }
    - {
        feature_id: ac_phase_three_out,
        part_id: b,
        quantity_kind: voltage,
        address: 39124,
        type: uint16,
        scale: 0.1,
        decimals: 1,
      }
    - {
        feature_id: ac_phase_three_out,
        part_id: c,
        quantity_kind: voltage,
        address: 39125,
        type: uint16,
        scale: 0.1,
        decimals: 1,
      }
    # --- Inverter AC output, per-phase current (foxess inv_current_R/S/T) ---
    - {
        feature_id: ac_phase_three_out,
        part_id: a,
        quantity_kind: current,
        address: 39126,
        type: int32,
        scale: 0.001,
        decimals: 3,
      } # high word; low 39127
    - {
        feature_id: ac_phase_three_out,
        part_id: b,
        quantity_kind: current,
        address: 39128,
        type: int32,
        scale: 0.001,
        decimals: 3,
      } # high word; low 39129
    - {
        feature_id: ac_phase_three_out,
        part_id: c,
        quantity_kind: current,
        address: 39130,
        type: int32,
        scale: 0.001,
        decimals: 3,
      } # high word; low 39131
    # --- Inverter AC output, per-phase reactive power (foxess inv_power_Q_R/S/T) ---
    - {
        feature_id: ac_phase_three_out,
        part_id: a,
        quantity_kind: reactive_power,
        address: 39256,
        type: int32,
        scale: 0.001,
        decimals: 3,
        unit: kvar,
      } # high word; low 39257
    - {
        feature_id: ac_phase_three_out,
        part_id: b,
        quantity_kind: reactive_power,
        address: 39258,
        type: int32,
        scale: 0.001,
        decimals: 3,
        unit: kvar,
      } # high word; low 39259
    - {
        feature_id: ac_phase_three_out,
        part_id: c,
        quantity_kind: reactive_power,
        address: 39260,
        type: int32,
        scale: 0.001,
        decimals: 3,
        unit: kvar,
      } # high word; low 39261
    # --- Inverter AC output, per-phase apparent power (foxess rpower_S_R/S/T) ---
    - {
        feature_id: ac_phase_three_out,
        part_id: a,
        quantity_kind: apparent_power,
        address: 39264,
        type: int32,
        scale: 0.001,
        decimals: 3,
        unit: kVA,
      } # high word; low 39265
    - {
        feature_id: ac_phase_three_out,
        part_id: b,
        quantity_kind: apparent_power,
        address: 39266,
        type: int32,
        scale: 0.001,
        decimals: 3,
        unit: kVA,
      } # high word; low 39267
    - {
        feature_id: ac_phase_three_out,
        part_id: c,
        quantity_kind: apparent_power,
        address: 39268,
        type: int32,
        scale: 0.001,
        decimals: 3,
