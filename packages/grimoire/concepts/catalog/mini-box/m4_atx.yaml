body:
  en: >
    Mini-Box M4-ATX intelligent DC-DC ATX power supply — one catalog entry: its identity (the `power_supply` archetype) AND how it is talked to (its usbhid slot). `manufacturer: Mini-Box` and `archetype: power_supply` are inherited from ./_defaults.yaml.
    
    
    This medium is the COMPLETE protocol, as data: a gateway in any language reads it to drive the device — which USB device to open (transport.usb), how to poll it (link), and how to decode the 24-byte frame (fields). Verified against the upstream m4api C source (mini-box/m4atx, m4api.c):
    
      • Poll: interrupt-write [0x81,0x00] to EP 0x01, interrupt-read 24 bytes from EP 0x81.
      • A valid frame stamps 0x21 at byte 0; the firmware version is byte 23 (high nibble = major).
      • Voltage bytes are firmware-scaled: major < 2 uses the V1 conversion table (the `legacy`
        profile below), major >= 2 the V2 table (the base `scale`). Temperature is a signed
        big-endian 16-bit °C at byte 12, firmware-independent.
    
    These byte offsets / scales / endianness are read directly off m4GetDiag + the m4TypeConversions V1/V2 tables in m4api.c — defined once here so every consuming gateway (in any language) branches off the same definition instead of each re-encoding it.
    
    
    Diag fields: each field LINKS nowhere yet — carried RAW with a `label` (the same interim path chint/dtsu666 uses for un-attributed registers), pending a DC-rail/enclosure feature atom on the power_supply archetype. `scale` is the V2 conversion; `scale_overrides.legacy` the V1 one. Voltages print to 2 decimals, temperature to 0 (matching m4PrintVal in m4api.c).
    
    
    Control plane: the device's 47 settable parameters (m4ConfigFields in m4api.c), read/written by INDEX over the same endpoints as the diag poll. GET writes [0xa4,0xa1,index,length], reads 24 bytes (magic 0x31), value at byte 4; SET writes [0xa4,0xa0,index,length,val…] and the device echoes index+value. `scale` is the V2 conversion table; `scale_overrides.legacy` the V1 one (only the voltage types differ between firmwares). Names are the lowercased device field names; the digit-leading rail fields (12V_MAX…) become v12_*/v5_*/v33_* to be valid slugs and to match the diag labels. Voltages are in SI volts (unit omitted); timers carry a 0xffff="never" sentinel. All read_write except `reset` (a write-only factory-reset action).
product:
  model: M4-ATX

usbhid:
  usb_wire: # the USB wire directly (USB-only medium — no serial/tcp map)
    vendor_id: 0x04d8 # Microchip (the M4-ATX's MCU vendor)
    product_id: 0xd001
    interface: 0
    configuration: 1
    alt_setting: 0
    detach_kernel_driver: true # Linux usbhid claims the device; a userspace reader detaches it first
  emit:
    topic_prefix: m4atx # MQTT messages published as <topic_prefix>/<group>
    # The device's diagnostics refresh ~1 Hz (the m4ctl `-diag loop` cadence is a fixed 1 s); poll
    # at that rate. Named for the RATE, not a fetch strategy.
    update_interval_ms: 1000
    # `changed`: suppress a publish when every value in the group equals its last. A live supply's
    # rails always jitter ⇒ it publishes ~1:1 with the poll anyway; harmless here.
    publish: changed
    # `per_value`: one retained bare-value topic per reading (`m4atx/state/<key>`), preserving the
    # flat layout the legacy m4ctl-pub publisher exposed to existing subscribers.
    format: per_value
  usbhid_link:
    transfer: interrupt # M4-ATX polls over interrupt endpoints (not the control pipe)
    write_endpoint: 0x01 # OUT — poll command
    read_endpoint: 0x81 # IN — response frame
    timeout_ms: 3000
    poll_command: [0x81, 0x00] # m4FetchDiag pollCmd
    response_length: 24
    response_magic: { offset: 0, expect: 0x21 } # m4FetchDiag rejects a frame whose byte 0 != 0x21
    firmware:
      offset: 23 # m4CheckVersion reads byte 23
      nibble: high # major version = high nibble; minor = low nibble
      select:
        - { lt: 2, profile: legacy } # major < 2 ⇒ V1 conversion table; else (>= 2) base scale (V2)
  usbhid_fields:
    - {
        raw_name: vin,
        offset: 2,
        type: uint8,
        scale: 0.1552,
        scale_overrides: { legacy: 0.1123 },
        decimals: 2,
      } # input voltage
    - {
        raw_name: ign,
        offset: 3,
        type: uint8,
        scale: 0.1552,
        scale_overrides: { legacy: 0.1123 },
        decimals: 2,
      } # ignition voltage
    - {
        raw_name: v33,
        offset: 4,
        type: uint8,
        scale: 0.0195,
        scale_overrides: { legacy: 0.0188136 },
        decimals: 2,
      } # 3.3V rail
    - {
        raw_name: v5,
        offset: 5,
        type: uint8,
        scale: 0.0389,
        scale_overrides: { legacy: 0.0375 },
        decimals: 2,
      } # 5V rail
    - {
        raw_name: v12,
        offset: 6,
        type: uint8,
        scale: 0.1165,
        scale_overrides: { legacy: 0.076625 },
        decimals: 2,
      } # 12V rail
    - { raw_name: temp, offset: 12, type: int8, scale: 1.0, decimals: 0, unit: degC } # board temperature (signed byte, m4TypeLengths[M4_DEG]==1)

  usbhid_config:
    request_length: 24
    response_magic: { offset: 0, expect: 0x31 }
    index_offset: 2
    length_offset: 3
    value_offset: 4
    get_command: [0xa4, 0xa1]
    set_command: [0xa4, 0xa0]
    parameters:
      # Ignition (M4_VLT_12_11 / M4_MSC_10_1)
      - {
          name: ign_high,
          field_index: 0x00,
          type: uint8,
          access: read_write,
          scale: 0.1552,
          scale_overrides: { legacy: 0.1123 },
          decimals: 2,
        }
      - {
          name: ign_low,
          field_index: 0x01,
          type: uint8,
          access: read_write,
          scale: 0.1552,
          scale_overrides: { legacy: 0.1123 },
          decimals: 2,
        }
      - {
          name: ign_dbc,
          field_index: 0x02,
          type: uint8,
          access: read_write,
          scale: 10.0,
          decimals: 0,
          unit: ms,
        }
      - {
          name: psu_delay,
          field_index: 0x03,
          type: uint8,
          access: read_write,
          scale: 1.0,
          decimals: 0,
          unit: s,
        }
      # Input-voltage thresholds (M4_VLT_12_11)
      - {
          name: vin_min_start,
          field_index: 0x04,
          type: uint8,
          access: read_write,
          scale: 0.1552,
          scale_overrides: { legacy: 0.1123 },
          decimals: 2,
        }
      - {
          name: vin_min_on,
          field_index: 0x05,
          type: uint8,
          access: read_write,
          scale: 0.1552,
          scale_overrides: { legacy: 0.1123 },
          decimals: 2,
        }
      - {
          name: vin_min_5v,
          field_index: 0x06,
          type: uint8,
          access: read_write,
          scale: 0.1552,
          scale_overrides: { legacy: 0.1123 },
          decimals: 2,
        }
      - {
          name: vin_max,
          field_index: 0x07,
          type: uint8,
          access: read_write,
          scale: 0.1552,
          scale_overrides: { legacy: 0.1123 },
          decimals: 2,
        }
      # Rail voltage limits (M4_VLT_12_07 / M4_VLT_5_03 / M4_VLT_33_01)
      - {
          name: v12_max,
          field_index: 0x08,
          type: uint8,
          access: read_write,
          scale: 0.1165,
          scale_overrides: { legacy: 0.076625 },
          decimals: 2,
        }
      - {
          name: v12_min,
          field_index: 0x09,
          type: uint8,
          access: read_write,
          scale: 0.1165,
          scale_overrides: { legacy: 0.076625 },
          decimals: 2,
        }
      - {
          name: v5_max,
          field_index: 0x0a,
          type: uint8,
          access: read_write,
          scale: 0.0389,
          scale_overrides: { legacy: 0.0375 },
          decimals: 2,
        }
      - {
          name: v5_min,
          field_index: 0x0b,
          type: uint8,
          access: read_write,
          scale: 0.0389,
          scale_overrides: { legacy: 0.0375 },
          decimals: 2,
        }
      - {
          name: v33_max,
          field_index: 0x0c,
          type: uint8,
          access: read_write,
          scale: 0.0195,
          scale_overrides: { legacy: 0.0188136 },
          decimals: 2,
        }
      - {
          name: v33_min,
          field_index: 0x0d,
          type: uint8,
          access: read_write,
          scale: 0.0195,
          scale_overrides: { legacy: 0.0188136 },
          decimals: 2,
        }
      # Rail startup times (M4_MSC_1_1, ms)
      - {
          name: v12_time,
          field_index: 0x0e,
          type: uint8,
          access: read_write,
          scale: 1.0,
          decimals: 0,
          unit: ms,
        }
      - {
          name: v33_time,
          field_index: 0x0f,
          type: uint8,
          access: read_write,
          scale: 1.0,
          decimals: 0,
          unit: ms,
        }
      # Power sequencing (M4_MSC_10_2 / M4_TRY / M4_SEC)
      - {
          name: pwrsw,
          field_index: 0x10,
          type: uint16,
          byte_order: big_first,
          access: read_write,
          scale: 10.0,
          decimals: 0,
          unit: ms,
        }
      - {
          name: psu_on_time,
          field_index: 0x12,
          type: uint8,
          access: read_write,
          scale: 1.0,
          decimals: 0,
          unit: tries,
        }
      - {
          name: on_delay,
          field_index: 0x13,
          type: uint8,
          access: read_write,
          scale: 1.0,
          decimals: 0,
          unit: s,
        }
      - {
          name: psu_off_time,
          field_index: 0x14,
          type: uint8,
          access: read_write,
          scale: 1.0,
          decimals: 0,
          unit: tries,
        }
      - {
          name: off_delay,
          field_index: 0x15,
          type: uint8,
          access: read_write,
          scale: 1.0,
          decimals: 0,
          unit: s,
        }
      # Emergency shutdown timers (M4_SEC)
      - {
          name: emg_time_5vsb,
          field_index: 0x16,
          type: uint8,
          access: read_write,
          scale: 1.0,
          decimals: 0,
          unit: s,
        }
      - {
          name: emg_timer,
          field_index: 0x17,
          type: uint8,
          access: read_write,
          scale: 1.0,
          decimals: 0,
          unit: s,
        }
      # PS_ON thresholds + anti-thump (M4_MSC_10_1 / M4_MSC_10_2, ms)
      - {
          name: ps_on_0,
          field_index: 0x18,
          type: uint8,
          access: read_write,
          scale: 10.0,
          decimals: 0,
          unit: ms,
        }
      - {
          name: ps_on_1,
          field_index: 0x19,
          type: uint8,
          access: read_write,
          scale: 10.0,
          decimals: 0,
          unit: ms,
        }
      - {
          name: thump,
          field_index: 0x1a,
          type: uint16,
          byte_order: big_first,
          access: read_write,
          scale: 10.0,
          decimals: 0,
          unit: ms,
        }
      # Temperature limits (M4_DEG, signed °C)
      - {
          name: temp_max,
          field_index: 0x1c,
          type: int8,
          access: read_write,
          scale: 1.0,
          decimals: 0,
          unit: degC,
        }
      - {
          name: temp_min,
          field_index: 0x1d,
          type: int8,
          access: read_write,
          scale: 1.0,
          decimals: 0,
          unit: degC,
        }
      # Emergency-off mode selector + 5V standby delay (M4_BYT / M4_MSC_10_1)
      - {
          name: emg_off_mode,
          field_index: 0x1e,
          type: uint8,
          access: read_write,
          scale: 1.0,
          decimals: 0,
        }
      - {
          name: v5_sby_dly,
          field_index: 0x1f,
          type: uint8,
          access: read_write,
          scale: 10.0,
          decimals: 0,
          unit: ms,
        }
      # Per-mode shutdown timers (M4_TIM, seconds; 0xffff = never)
      - {
          name: off_delay_0,
          field_index: 0x20,
          type: uint16,
          byte_order: big_first,
          access: read_write,
          scale: 1.0,
          decimals: 0,
          unit: s,
          sentinel: { raw: 0xffff, meaning: never },
        }
      - {
          name: off_hard_0,
          field_index: 0x22,
          type: uint16,
          byte_order: big_first,
          access: read_write,
          scale: 1.0,
          decimals: 0,
          unit: s,
          sentinel: { raw: 0xffff, meaning: never },
        }
      - {
          name: off_delay_1,
          field_index: 0x24,
          type: uint16,
          byte_order: big_first,
          access: read_write,
          scale: 1.0,
          decimals: 0,
          unit: s,
          sentinel: { raw: 0xffff, meaning: never },
        }
      - {
          name: off_hard_1,
          field_index: 0x26,
          type: uint16,
          byte_order: big_first,
          access: read_write,
          scale: 1.0,
          decimals: 0,
          unit: s,
          sentinel: { raw: 0xffff, meaning: never },
        }
      - {
          name: off_delay_2,
          field_index: 0x28,
          type: uint16,
          byte_order: big_first,
          access: read_write,
          scale: 1.0,
          decimals: 0,
          unit: s,
          sentinel: { raw: 0xffff, meaning: never },
        }
      - {
          name: off_hard_2,
          field_index: 0x2a,
          type: uint16,
          byte_order: big_first,
          access: read_write,
          scale: 1.0,
          decimals: 0,
          unit: s,
          sentinel: { raw: 0xffff, meaning: never },
        }
      - {
          name: off_delay_3,
          field_index: 0x2c,
          type: uint16,
          byte_order: big_first,
          access: read_write,
          scale: 1.0,
          decimals: 0,
          unit: s,
          sentinel: { raw: 0xffff, meaning: never },
        }
      - {
          name: off_hard_3,
          field_index: 0x2e,
          type: uint16,
          byte_order: big_first,
          access: read_write,
          scale: 1.0,
          decimals: 0,
          unit: s,
          sentinel: { raw: 0xffff, meaning: never },
        }
      - {
          name: off_delay_4,
          field_index: 0x30,
          type: uint16,
          byte_order: big_first,
          access: read_write,
          scale: 1.0,
          decimals: 0,
          unit: s,
          sentinel: { raw: 0xffff, meaning: never },
        }
      - {
          name: off_hard_4,
          field_index: 0x32,
          type: uint16,
          byte_order: big_first,
          access: read_write,
          scale: 1.0,
          decimals: 0,
          unit: s,
          sentinel: { raw: 0xffff, meaning: never },
        }
      - {
          name: off_delay_5,
          field_index: 0x34,
          type: uint16,
          byte_order: big_first,
          access: read_write,
          scale: 1.0,
          decimals: 0,
          unit: s,
          sentinel: { raw: 0xffff, meaning: never },
        }
      - {
          name: off_hard_5,
          field_index: 0x36,
          type: uint16,
          byte_order: big_first,
          access: read_write,
          scale: 1.0,
          decimals: 0,
          unit: s,
          sentinel: { raw: 0xffff, meaning: never },
        }
      - {
          name: off_delay_6,
          field_index: 0x38,
          type: uint16,
          byte_order: big_first,
          access: read_write,
          scale: 1.0,
          decimals: 0,
          unit: s,
          sentinel: { raw: 0xffff, meaning: never },
        }
      - {
          name: off_hard_6,
          field_index: 0x3a,
          type: uint16,
          byte_order: big_first,
          access: read_write,
          scale: 1.0,
          decimals: 0,
          unit: s,
          sentinel: { raw: 0xffff, meaning: never },
        }
      - {
          name: off_delay_7,
          field_index: 0x3c,
          type: uint16,
          byte_order: big_first,
          access: read_write,
          scale: 1.0,
          decimals: 0,
          unit: s,
          sentinel: { raw: 0xffff, meaning: never },
        }
      - {
          name: off_hard_7,
          field_index: 0x3e,
          type: uint16,
          byte_order: big_first,
          access: read_write,
          scale: 1.0,
          decimals: 0,
          unit: s,
          sentinel: { raw: 0xffff, meaning: never },
        }
      # Factory reset — a write-only action (M4_BYT, index 0xff)
      - { name: reset, field_index: 0xff, type: uint8, access: write, scale: 1.0, decimals: 0 }

# Pinned identity — the stable reference (code = short-code minted at creation); survives re-filing/renames.
identity:
  slug: m4_atx
  code: 05SCNF2G
