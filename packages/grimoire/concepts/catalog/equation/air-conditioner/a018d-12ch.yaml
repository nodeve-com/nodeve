# Equation A018D-12CH — 12k-class reversible (cooling + heating) split air conditioner, datasheet
# only. `manufacturer: Equation` is inherited from ../../_defaults.yaml, `archetype: air_conditioner`
# from ../_defaults.yaml. Model facts only; any fitted per-unit draw bands are SITE data, not here.
product:
  model: A018D-12CH

# Defining feature — rated cooling output (thermal power). Nameplate 9000 BTU/h, converted to the
# canonical SI unit (W): 9000 × 0.293071 ≈ 2638 W. No unit override — W is canonical for power.
cooling:
  feature_spec:
    combined:
      cooling_capacity:
        intervals:
          - interval: { nominal: 2638 } # 9000 BTU/h rated cooling

# The AC phase the unit runs on — accepted 220–240 V / 50 Hz single-phase plus its electrical input
# draw (active_power). The two draw figures are the unit's own operating modes — each an IDENTIFIED
# intervals band (its identity.slug + title naming the mode), referenceable by
# {feature, property, interval}. The connection is the archetype's, not the compressor's.
ac_phase:
  feature_spec:
    combined:
      voltage:
        intervals:
          - interval: { rating: continuous, min: 220, max: 240 } # 220–240 V single phase
      frequency:
        intervals:
          - interval: { nominal: 50 }
      active_power:
        intervals:
          - identity: { slug: cooling }
            title: { en: Cooling }
            interval: { nominal: 1391 } # rated input power, cooling
          - identity: { slug: heating }
            title: { en: Heating }
            interval: { nominal: 1346 } # rated input power, heating

# Vapor-compression circuit — working gas only. `refrigerant` is a property code
# (enumeration/refrigerant/r290 → Propane, A3, GWP 3).
compressor:
  refrigerant: r290

# Pinned identity — the stable reference (code = short-code minted at creation); survives re-filing/renames.
identity:
  slug: a018d_12ch
  code: T3HGXKDC
