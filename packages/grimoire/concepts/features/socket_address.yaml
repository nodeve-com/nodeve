body:
  en: >
    A SOCKET ADDRESS — the (host, port, transport) tuple naming WHERE to reach a node and over which L4 wire: L3 `host` + L4 `port` + the `transport_protocol` ({tcp, udp}). The full sockaddr the dial side hands to the socket; the URL authority. `transport_protocol` is OPTIONAL — a raw socket spells it (a bare TCP/UDP link has no scheme to imply it from), a URL endpoint derives it from its scheme (all URI-scheme `service_protocol` members are TCP-family, so `endpoint` pins it to tcp — see there). Pure addressing — WHERE + which wire, not how-to-connect (retry/timeout is dial policy, `reconnect`).
prop:
  host: {}
  port: {}
enums:
  - transport_protocol
