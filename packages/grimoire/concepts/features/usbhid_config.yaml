concept_settings:
  # The CONFIG EXCHANGE — how to GET and SET the device's named settings by index, plus the parameter
  # list. Control-plane counterpart to the streamed diag read (usbhid_link + usbhid_fields): config
  # issues a per-parameter request — index_offset/length_offset bytes select the parameter, value at
  # value_offset (GET response and SET request). Rides the SAME endpoints/transfer/timeout as the
  # diag link; only the command framing differs. `response_magic` composes the shared magic_byte slot
  # (M4-ATX: byte 0 == 0x31, validated on GET and SET). Mirrors m4GetConfig/m4SetBinary (m4api.c).
  compose: [ magic_byte ]
prop:
  request_length: {}
  index_offset: {}
  length_offset: {}
  value_offset: {}
  get_command: {}
  set_command: {}
  parameters: {} # array of usbhid_params items
