# SERVICE BINDING — the LOCAL listen socket of a service: which of this node's interfaces/addresses
# the listener binds to, and on which `port`. The address is named by REFERENCE into the node's own
# network topology, never restated: `ip_address_id` pins one L3 address (an `ip_addresses` instance —
# the specific binding, its `ip_address` already owned there) or `network_interface_id` pins a NIC
# (all its addresses); `bind` is the literal fallback (0.0.0.0 / 127.0.0.1) when no instance is
# pinned. Mirror of `endpoint` (the dial/reach side) — this is the serve side, so no dial policy;
# `service_protocol` names WHAT it speaks (the FULL vocab, including modbus_tcp — endpoint filters to
# the URI-scheme subset). At most one of the two references: an address already implies its interface.
title: { en: Service binding }
description:
  en: "The local listen socket of a service — the protocol it speaks (service_protocol) and which of the node's interfaces/addresses it binds to (by reference into the node's own network_interfaces/ip_addresses), on which port. The serve-side mirror of endpoint."
enums:
  - service_protocol # what the service speaks — modbus_tcp / mqtt / http / … (full vocab)
prop:
  network_interface_id: {}
  ip_address_id: {}
  port: {}
  bind: {}
schema:
  # An address (ip_address_id) already implies its NIC — pinning both is contradictory, so forbid it.
  not: { required: [network_interface_id, ip_address_id] }
