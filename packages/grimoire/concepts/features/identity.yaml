# slug is REQUIRED wherever an identity appears — authored YAML rarely spells it: the de-sugar
# fills it from the file stem before validation (and archetype from the layer/_defaults cascade;
# archetype stays gate-enforced only — a NESTED identity, e.g. a feature's on-bus slug handle,
# legitimately carries none).
prop:
  archetype: {}
  slug: { schema: { required: true } }
  slug_qualified: {}
  id: {}
  code: {}
  symbol: {}
  broader: {}
  url: {}
  iri_template: {}
