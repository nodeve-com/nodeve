body:
  en: >
    The MPPT (maximum-power-point tracking) DC-input envelope of a PV-coupled converter — the voltage WINDOW the tracker hunts within. Distinct from ac-output (what it puts out) and the panel's own dc ratings: this is the tracker's behaviour. The NUMBER of independent trackers is not a field here — it is the cardinality of the pv-string part ('per-entry'): the catalog entry fills the string count (see archetypes/inverter).
prop:
  mppt_window: {}
