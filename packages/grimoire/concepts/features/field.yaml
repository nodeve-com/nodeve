# META (was field.ts): how an atom carries presentation + i18n WITHOUT polluting the value
# contract. i18n never goes into JSON-Schema title/description as records (breaks standard
# tools); text + presentation live in SIDE dictionaries keyed by field id (gettext / i18next /
# JSON-Forms convention). Three independent emits, merged by consuming tooling:
#   schema.json — the clean value contract
#   lang.json   — per-locale label+hint per field (TOTAL: a gap fails check)
#   ui.json     — non-derivable presentation hints (PARTIAL; e.g. mono: code-like content)
# Plus the crosswalk sidecar (refs): registry + term + SKOS match per field, with a `self` slot
# for the atom as a whole — resolves to full IRIs via the registry's iri_template.
# In the YAML layer this is superseded by inline title/description/refs on property files and
# per-feature `prop.<name>.*` overrides; kept as the rationale record. Locales: en, pt.
