title: { en: IP binding }
body:
  en: >
    IP BINDING — one L3 address bound to a NIC: the address itself (ip_address), which family it is (ip_family: ipv4/ipv6), and an optional resolving name (fqdn). Homed on the `ip_addresses` archetype (that class is a LIST per interface — its `is_array`); this feature is the per-address block and carries no cardinality of its own. Distinct axis from network_link (the L2 datasheet) — this is L3. Named `ip_binding` so the feature stem stays distinct from its `ip_address` prop.
enums:
  - ip_family # ipv4 vs ipv6 — which L3 protocol this address speaks
prop:
  ip_address: {}
  fqdn: {}
