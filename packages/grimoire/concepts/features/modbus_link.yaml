# Modbus framing/addressing (modbus-specific) — the slave id, register file, and word order.
# Distinct from transport (the wire, shared) and emit (the MQTT output, shared): this is what
# makes a read a MODBUS read. Composed by the modbus connectivity archetype. The register_type
# slot is defined once here (a device's link and a tap window both compose it).
# TODO: this feature welds two layers — framing (register_type, word_order) and addressing
# (unit_id). Addressing is a cross-protocol layer (see features/addressing.yaml, which now homes
# wifi_ssid); `unit_id` likely wants to migrate there, leaving this as pure framing.
prop:
  register_type: {}
  unit_id: {}
  word_order: {}
