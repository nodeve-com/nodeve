title: { en: Column, pt: Coluna }
description:
  en: Relational metadata a property projects to as a DB column (foreign key, …).
  pt: Metadados relacionais que uma propriedade projeta como coluna de BD (chave estrangeira, …).
body:
  en: >
    A property's RELATIONAL metadata — the facts it projects to as a database column, distinct from its value-shape (that's `schema:`). Composed onto the `property` archetype, so any property may declare it. Today: `references` (the foreign-key target archetype, enforced by guard-refs). Grows here as more column facts are needed (uniqueness, index, …) — one place, not a bare key per fact.
prop:
  references: {}
