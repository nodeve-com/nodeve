# A THRESHOLD — a SINGLE bound a value is tested against, plus which side trips; the single-bound
# counterpart to `range`. Use wherever one edge matters: over-temperature cutout, low-charge alarm,
# a "start when above" trigger. Unit/quantity-agnostic (the enclosing concept supplies context).
# `bound` = the boundary (not `value`, reserved for magnitudes); `direction` borrowed from HA
# numeric_state (above/below), inclusiveness left to the consumer; `hysteresis` = optional deadband
# to suppress chatter — omit when unspecified, never fabricate.
prop:
  bound: {}
  direction: {}
  hysteresis: {}
