# A DIAL POLICY — how a dial-side connection behaves when connecting OUT: `connect_timeout_ms` (how
# long one attempt waits before giving up) + `reconnect_period_ms` (delay before a dropped link is
# retried). Behavior, NOT address (socket_address is WHERE; this is how-to-connect). Dial-only — a
# listener never dials or reconnects — so it rides the connect-out side, composed by `endpoint`,
# never a listen side.
prop:
  connect_timeout_ms: {}
  reconnect_period_ms: {}
