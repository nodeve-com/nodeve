title:
  en: AC 3-Phase Load
  pt: Carga CA trifásica
body:
  en: >
    The whole-load AC feature-of-interest a box meters downstream of its own port (foxess load_power: the home's total draw as the inverter sees it). Same three-phase shape as its siblings — a device fills only what it meters (fox reports the combined total), the per-phase parts stay optional.
refs:
  - registry_id: sosa
    term: FeatureOfInterest
    match: broad
  - registry_id: brick
    term: Electrical_Meter
    match: related
concept_settings:
  # The canonical three-phase shape (whole + a/b/c + ab/bc/ca) via the parts map directly — NOT
  # `compose: ac_phase_three`, because this feature adds its own combined-only columns below, and
  # compose+own-prop would flatten the parted shape (own `part:` keeps it parted).
  part: electrical_ac_phase_three
  is_specification: true # active_energy (composed) carries lifetime + daily load channels as intervals
# Load energy is the composed `active_energy` column: lifetime total + daily (period: daily) as two
# measurable intervals (undirected — load is one direction). No named-quantity column.
