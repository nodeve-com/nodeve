concept_settings:
  # The canonical three-phase shape (whole + a/b/c + ab/bc/ca) via the parts map directly — NOT
  # `compose: ac_phase_three`, because this feature adds its own combined-only columns below, and
  # compose+own-prop would flatten the parted shape (own `part:` keeps it parted).
  part: electrical_ac_phase_three
  is_specification: true # active_energy (composed) carries directional meter channels as intervals
# Whole-meter directional energy is the ONE composed `active_energy` column: feed-in (export, flow out)
# and grid consumption (import, flow in), lifetime + daily, are measurable intervals keyed by
# flow_direction + period — never separate columns, never per-phase. Kind stays pure active_energy.
