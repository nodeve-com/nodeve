concept_settings:
  part: electrical_ac_phase_three
title:
  en: Three-phase AC
  pt: CA trifásica
description:
  en: A three-phase AC connection as one whole — the fixed, mandatory set of phases A, B and C (CIM PhaseCode.ABC).
  pt: Uma ligação CA trifásica como um todo — o conjunto fixo e obrigatório de fases A, B e C (CIM PhaseCode.ABC).
body:
  en: >
    The CANONICAL three-phase AC connection shape: the whole plus per-phase (a/b/c) and per-line (ab/bc/ca) parts (parts/electrical_ac_phase_three.yaml). Every concrete three-phase feature-of-interest — connection point, EPS output, grid injection — is THIS shape under a new name: `compose: ac_phase_three` (kit/resolve.ts pure reuse), restating only its own title/refs. The parted spec lives HERE, once.

# Feature identity crosswalk (the connection AS A WHOLE — all three phases). Standards don't coin a
# standalone three-phase noun: they qualify a connection with a phase code. PhaseCode.ABC is that exact
# "all three" literal (vs single-phase ac_phase's PhaseCode.A). The phase is the repeated INSTANCE.
refs:
  - registry_id: sosa
    term: FeatureOfInterest
    match: broad
  - registry_id: seas
    term: AlternatingCurrentConnectionPoint
    match: close
  - registry_id: cim
    term: PhaseCode.ABC
    match: close
  - registry_id: sunspec
    term: '203'
    match: related

# Part map lives in parts/electrical_ac_phase_three.yaml (features ref it via `part:`) — not restated here.
