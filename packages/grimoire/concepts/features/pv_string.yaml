description:
  en: PV String instance of on a site install.
body:
  en: >
    One PV STRING as installed — the per-string install facts a datasheet can't know (position, wiring, orientation, fitted voc). The panel MODEL is a catalog reference; per-string electrical truth (vmp, voc, capacity) is DERIVED from that datasheet × series_count downstream, never restated here.
prop:
  ordinal: { schema: { required: true } }
  active: { schema: { required: true } }
  series_count: { schema: { required: true } } # panels in series on this MPPT input
  azimuth: { schema: { required: true } } # compass degrees, 0° = N
  tilt: { schema: { required: true } } # degrees from horizontal
  voc_eff: {} # optional; as-deployed open-circuit voltage, fitted per string
  catalog_item: { schema: { required: true } } # the panel model, by archetype + slug
