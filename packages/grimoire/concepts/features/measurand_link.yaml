concept_settings:
  # The MEASURAND LINK — how a decoded value attaches to the feature tree it reads. Single place
  # feature_id/part/ordinal/quantity_kind/raw_name are defined for decode maps: modbus registers,
  # USB-HID byte maps and VE.Direct field maps each LINK a value to a measurand the projected
  # feature tree offers — (feature_id, part | ordinal, quantity_kind) — or, when not yet
  # attributable, carry a raw_name for traceability (RAW/unlinked). Topic is DERIVED from the link
  # downstream, not authored. All slots OPTIONAL: a LINKED value fills feature_id + quantity_kind;
  # a RAW value fills only raw_name. A repeated feature's instance is selected by the instance_key
  # feature (`part` | `ordinal` — see features/instance_key.yaml for the precedence the consuming
  # gateway applies); the `combined` aggregate is linked with both ABSENT.
  compose:
    - instance_key
enums:
  - quantity_kind # LINKED value: which BASE KIND this reads (pure — active_energy, active_power, …)
  - quantity # OPTIONAL named measurand (enumeration/quantity): the effective column when set. A link
    # fills EITHER quantity_kind OR quantity (plus feature_id). Used where two channels of one kind
    # coexist on a feature (feed_in vs grid_consumption energy, total vs today) — the named `quantity`
    # is the column key + sensor-id segment; its base kind resolves downstream (measurand-tree).
prop:
  feature_id: {}
  raw_name: {}
# NB author quantity_kind XOR quantity — one per link. The EMIT bakes the quantity's resolved base
# kind into quantity_kind on the artifact (kit/emit-catalog.ts bakeRegisterBaseKinds), so a JSON
# reader routes on the kind without the enumeration module; effective column stays quantity ?? kind.
