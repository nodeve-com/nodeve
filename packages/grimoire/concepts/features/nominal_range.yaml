concept_settings:
  # A NOMINAL RANGE — a rated/designated value (`nominal`) plus the tolerated band around it (min/max,
  # OPTIONAL — a datasheet may give only the nominal; never fabricate a band). Unit/quantity-AGNOSTIC:
  # the enclosing concept names the slot and supplies the unit (`nominal`, never `nominal_v`).
  # Extends the bare `range` feature — min/max are not re-spelled here.
  # Band as a fraction of nominal: symmetric => `tolerance` (property/spec); asymmetric => the
  # lower_fraction/upper_fraction MULTIPLIER pair, the verbatim spec-sheet form (e.g. 0.7Un–1.2Un).
  compose: [ range ]
prop:
  nominal: {}
  fraction_lower: {}
  fraction_upper: {}
  # A nominal_range band is PARTIAL — nominal-only, one-sided, or full all legal. Relax the min/max
  # `required` that the composed `range` feature stamps (that requiredness is right for a bare range,
  # wrong for a rated interval that may state only its nominal).
  min: { schema: { required: false } }
  max: { schema: { required: false } }
