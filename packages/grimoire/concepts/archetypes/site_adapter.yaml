# One SITE ADAPTER — a physical decoder peer of the bus topology (a gateway-daemon link, a
# passive-tap board): identity, host, ingest kind, and the tap windows it republishes.
# Its topic root DERIVES as <pathname>/<slug> (never authored — root and identity can't drift);
# every published path nests the ingest-kind segment under it. Cross-field rules a schema can't
# express are enforced once at bake by validateSite (kit/validate-site.ts): `modbus_tap` windows
# present iff ingest_kind is modbus_tap. (A discriminated union on ingest_kind would make it
# structural — pending emitter support for oneOf.)
concept_settings:
  compose: thing # identity (the slug), title (the human label), description, refs

feature:
  ingest: {} # ingest kind + platform
  emit: {} # per-adapter publish overrides (cadence, sinks, format) off the connection's defaults
  addressing: {} # optional — the WiFi network the board joins (L2); on-board decoder platforms only
  endpoint: {} # how the decoder is reached — a raw tcp/udp socket (host + port + transport_protocol) or, with a scheme, a URL
  modbus_tap_window: {} # the master-poll windows a passive tap republishes (modbus_tap only)
