# CONNECTIVITY MEDIUM, not a device: a composition assigning atoms to named slots. `emit` (the
# MQTT output) is SHARED with every decoder→MQTT medium; the transport is the USB-specific atom
# (USB-only — unlike the serial/tcp transport map the modbus medium uses, since nothing else rides
# USB); the rest is USB-HID framing. Mirrors the modbus medium: where modbus has link (addressing)
# + registers (the map), usbhid has link (the HID exchange) + fields (the byte map). Carries
# everything a gateway in ANY language needs: which USB device to open (transport), how to poll it
# (link), how to decode the frame (fields). Ships a standalone schema.json; no catalog instances
# of its own. Keyed by its `usbhid` slot on the device archetype — that slot key IS the
# discriminator (no in-band field repeats it).
#
# OSI: USB-HID is NOT an application protocol — it is a USB DEVICE-CLASS / transport framework
# (L5-7), strictly tied to the USB transport (captured by usb_wire). The `refs` crosswalk records
# the USB-IF HID class identity. FUTURE (layer-honest model, docs/communication_protocol_standards.md):
# an interface_type=usb axis could be pinned; today the usb_wire branch already implies it.

title:
  en: USB-HID medium
description:
  en: A USB-HID connectivity medium — a USB device-class/transport framework, not an application protocol (transport + emit + HID exchange + byte-field map).

# Standards identity (moved off the deleted application_protocol enum; keep the crosswalk with the def).
refs:
  - { registry_id: usb_class, term: HID, match: exact }

feature:
  usb_wire: {} # the USB wire directly (USB-only medium — no serial/socket map)
  emit: {}
  usbhid_link: {} # the HID exchange (poll/response framing)
  usbhid_fields: {} # the byte-field map — a LIST of field rows
  usbhid_config: {} # control-plane parameter exchange
