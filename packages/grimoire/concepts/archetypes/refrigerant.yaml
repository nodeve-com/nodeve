title:
  en: Refrigerant
  pt: Refrigerante
description:
  en: The working gas of a vapor-compression cycle — ASHRAE 34 designation + safety class, GWP, chemical formula.
  pt: O gás de trabalho de um ciclo de compressão de vapor — designação ASHRAE 34 + classe de segurança, GWP, fórmula química.
body:
  en: >
    A REFRIGERANT — the working gas of a vapor-compression cycle. A Term (identity + i18n label + crosswalks) plus the facts that drive decisions: ASHRAE Standard 34 designation + safety class, IPCC AR5 100-year GWP, chemical formula. The refrigerants (r290, ...) are INSTANCES under enumeration/refrigerant/, each crosswalked to ASHRAE 34. Fill only known values — never fabricate.
