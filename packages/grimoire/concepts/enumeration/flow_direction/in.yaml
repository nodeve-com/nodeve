# Inflow — into the feature (import / consumption / drawn-in). An IDENTITY axis: in and out are
# SEPARATE channels (e.g. two monotonic energy counters), not the sign of one — so the sensor id/key
# composes from this value. Formerly encoded as the negative sign of a single channel; named now so
# the channel is addressable.
title: { en: Inflow, pt: Entrada }
description:
  en: "Inflow into the feature (import / consumption) — a distinct channel, not a sign."
refs:
  - { registry_id: cim, term: FlowDirectionKind.forward, match: close }
