# the old limit_class `continuous`). The tightest of the normal tiers: continuous ⊂ intermittent ⊂
# survival. No `duration` — the unbounded tier. The overload/derate baseline: a reading beyond this
# band's bound IS the overload/derate onset; the bounded-time region above it is `intermittent`.
title: { en: Continuous, pt: Contínuo }
description:
  en: "Normal design capacity — rated to hold indefinitely. A reading beyond its bound is the overload condition."
