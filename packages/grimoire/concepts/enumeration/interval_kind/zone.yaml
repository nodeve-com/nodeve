# A BOOLEAN REGION — a named region of the quantity's own axis with NO spec-sheet capability claim:
# a reading is inside it or not (an MPPT voltage window, a compressor's normal-draw band, an
# enclosure-temp derate-onset band). Authorable explicitly; when omitted, DERIVED from a `zone` value (enumeration/zone). Each yields a
# boolean "in this region" sensor and may ALSO anchor an inbound `interval_item` other bands gate on.
# STATELESS by default; a `trigger_on` axis on the zone makes THAT zone a stateful hysteretic trigger
# (startup/run-command) — folds in the former standalone `threshold` kind, no separate interval_kind.
# Structural signature: carries an `identity.slug` (auto-derived from the zone name); a slugless zone
# is unnameable and produces nothing.
title: { en: Zone, pt: Zona }
description:
  en: "A named region of the quantity's own axis, no capability claim — in-zone or not, a boolean sensor. Derived from a `zone` value; may also be an interval_item anchor. Add `trigger_on` to make the zone a stateful hysteretic trigger."
