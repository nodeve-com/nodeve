title: { en: Zone, pt: Zona }
description:
  en: "A named region of the quantity's own axis, no capability claim — in-zone or not, a boolean sensor. Derived from a `zone` value; may also be an interval_item anchor. Add `trigger_on` to make the zone a stateful hysteretic trigger."
body:
  en: >
    A BOOLEAN REGION — a named region of the quantity's own axis with NO spec-sheet capability claim: a reading is inside it or not (an MPPT voltage window, a compressor's normal-draw band, an enclosure-temp derate-onset band). Authorable explicitly; when omitted, DERIVED from a `zone` value (enumeration/zone). Each yields a boolean "in this region" sensor and may ALSO anchor an inbound `interval_item` other bands gate on.
    
    
    STATELESS by default — the boolean is TRUE while the reading sits INSIDE `[min, max]`, f(reading) with no history: it doesn't matter whether the prior value was on or off. That is the whole contrast with the stateful trigger, and it lives HERE: same `min`/`max` fields, opposite sense. A `trigger_on` axis on the zone flips it — `[min, max]` becomes the HOLD/deadband, ON is the region OUTSIDE it on the `trigger_on` side, and the boolean holds its PRIOR state between the edges (f(reading, prior_state)) — a hysteretic trigger (startup/run-command), folding in the former standalone `threshold` kind, no separate interval_kind. In short: no `trigger_on` ⇒ true inside; `trigger_on` ⇒ ON outside, stateful.
    
    
    Structural signature: carries an `identity.slug` (auto-derived from the zone name); a slugless zone is unnameable and produces nothing.
