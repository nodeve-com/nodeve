# A STATEFUL TRIGGER — the one interval_kind that is NOT a stateless f(reading): a hysteretic
# switch whose boolean output depends on the PRIOR on/off state. Its two hysteresis edges ARE `min`/`max`
# (the deadband/hold zone); `trigger_on` (above/below) picks which side is ON, the OUTSIDE region:
# `above` ⇒ ON above `max`, OFF below `min`; `below` ⇒ ON below `min`, OFF above `max` (a PV inverter
# starting above 140 V but not dropping out until below 90 V ⇒ trigger_on: above, min: 90, max: 140; a
# thermostat, a hygrostat, a run-command). Authorable explicitly; when omitted, DERIVED from the presence
# of `trigger_on`. Folds in the former standalone `threshold`
# feature. Distinct from `zone` (a stateless named region, ON inside) precisely by carrying state.
title: { en: Threshold, pt: Limiar }
description:
  en: 'A stateful hysteretic trigger (min/max hysteresis edges + trigger_on picking the ON side) — a boolean whose value depends on prior state, not the reading alone. Startup/shutdown, thermostat, hygrostat, run-command.'
