title: { en: Rating, pt: Classificação }
description:
  en: "The thing's rated capability envelope — a min/max edge it is rated to range within, graded by the rating tier."
body:
  en: >
    A RANGE — the thing's own rated capability envelope, an edge (min and/or max) it is rated to range within. Sub-graded by the `rating` tier (continuous/intermittent/short_term/startup/shutdown/ survival/protection_required/nominal) and, for a time-bounded tier, `duration`. Protection is a one-sided rating (the far end of the ramp), NOT a separate kind — that split has no structural signature and only inter-mixes, so there is no `limit` kind. Structural signature: at least one of min/max.
refs:
  - { registry_id: cim, term: OperationalLimitType, match: close }
