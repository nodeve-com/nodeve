# A RANGE — the thing's own rated capability envelope, an edge (min and/or max) it is rated to range
# within. Sub-graded by the `rating` tier (operating/survival/startup/protection_required) and, for
# a time-bounded tier, `limit_class` + `duration`. Protection is a one-sided rating (the far end of
# the ramp), NOT a separate kind — that split has no structural signature and only inter-mixes, so
# there is no `limit` kind. Structural signature: at least one of min/max.
title: { en: Rating, pt: Classificação }
description:
  en: "The thing's rated capability envelope — a min/max edge it is rated to range within, graded by the rating tier."
refs:
  - { registry_id: cim, term: OperationalLimitType, match: close }
