# The INSTRUMENT side — the span a SENSOR can read this quantity over (VIM 4.7 measuring interval /
# ssn-system MeasurementRange), NOT the thing's own behaviour. Not derivable from bounds (a bare
# min/max measurable is shaped like a rating), so `interval_kind` is AUTHORED. A measurable interval
# may carry the instrument-only fields (resolution, max_permissible_error, channel); a behaviour
# band may not — the consistency guard enforces both directions.
