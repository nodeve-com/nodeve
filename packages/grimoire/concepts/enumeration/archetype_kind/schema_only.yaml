title:
  en: Schema-only archetype
  pt: Arquétipo apenas-esquema
description:
  en: Archetype shipping a schema contract with no catalog instances (mediums, site shapes, deployment config).
body:
  en: >
    From archetype_registry.ts (schemaOnlyArchetypes): archetypes that ship a schema.json contract but have no catalog instances — connectivity mediums (modbus, usbhid, vedirect), site/installation shapes (solar_array, ambient_tank, location; instances live in sites/<name>/), and deployment config (mqtt_connection, gateway_config, adapters; instances live in each deploying consumer).
