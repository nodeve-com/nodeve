# Shared nodeve commit-gate checks, consumed with a single line from a consumer's
# lefthook.yml:
#
#   # lefthook.yml (consumer repo)
#   extends:
#     - node_modules/@nodeve/checks/lefthook.checks.yml
#
# The checks live inside a pre-commit job named `checks` (a parallel group). That
# name is the integration seam: lefthook merges same-named group jobs, so a repo
# that already has its own `checks` group (e.g. to add a typecheck or test job, or
# to run after index-mutating fixers) gets the shared bins merged INTO that group
# rather than appended at the top level. A repo with no `checks` group just gets
# this one as-is. Either way it's one `extends` line and all the standard checks
# come along together.
#
# Each job shells the `nodeve-check` dispatcher with the check's name via its
# node_modules/.bin path — portable across pnpm and bun, and resolvable since
# lefthook runs from the repo root (lefthook does NOT add node_modules/.bin to
# PATH). Every check renders the SAME uniform block (`<glyph> <name> — <summary>`
# + indented rows + an `--explain` pointer), so when the parallel group surfaces a
# failure the captured output is scannable instead of a wall of per-check formats.
# The dispatcher reads the repo's optional `nodeve.checks.js` for
# budgets/globs/allowlists and derives the repo root from git, so a check behaves
# the same whatever cwd lefthook uses.
#
# `{staged_files}` scopes path-aware checks to what's being committed; the dup and
# catalog jobs scan their full configured scope because a duplicate (or an
# un-cataloged pin) is a property of the whole tree, not one file. Bypass with
# `git commit --no-verify`. Run a single check by hand any time, e.g.
# `node_modules/.bin/nodeve-check doc-tokens --report`, or the whole suite at once
# with `nodeve-check` (summary-first). The per-check `nodeve-check-<name>` bins
# remain for direct invocation.
pre-commit:
  jobs:
    # Fixer, runs before the `checks` group so the gates see formatted, re-staged
    # content. Prettier-formats staged files in place; `stage_fixed` re-adds
    # whatever it touched. The bin bundles its own prettier (portable across pnpm
    # and bun, needs nothing on PATH) and honors the repo's prettier config and
    # `.prettierignore`. It skips symlinks itself, so no `file_types` filter is
    # needed here.
    #
    # The glob covers code as well as docs: `eslint-config-prettier` turns OFF every
    # stylistic eslint rule, so with markdown-only formatting nothing in the gate
    # judged code formatting at all. It must only name types prettier has a parser
    # for — prettier errors on a path it can't infer one for. Repos exclude paths
    # via `.prettierignore` (machine output, vendored code), not by narrowing this.
    - name: format
      glob: '*.{md,ts,tsx,js,jsx,mjs,cjs,mts,cts,svelte,json,jsonc,css,html,yml,yaml}'
      run: node_modules/.bin/nodeve-format {staged_files}
      stage_fixed: true

    - name: checks
      group:
        parallel: true
        jobs:
          - name: doc-tokens
            glob: '*.md'
            run: node_modules/.bin/nodeve-check doc-tokens {staged_files}

          # Prose gate — the OTHER engine. Not a `nodeve-check` bin: it's the `vale`
          # binary (from the repo's nix devShell, NOT node_modules) reading the
          # repo's `.vale.ini`, which pulls the org house rules from
          # `node_modules/@nodeve/checks` via `Packages` + `vale sync`. Guarded so
          # the shared config is safe in a repo that hasn't opted into prose yet:
          # runs only when `vale` is on PATH AND a `.vale.ini` exists, else skips.
          # When it runs, vale exits nonzero on `error`-level alerts and blocks;
          # warning/suggestion are advisory. Opt in: add a `.vale.ini` (copy the
          # block in @nodeve/checks/.vale.ini) and run `vale sync` once per clone.
          - name: vale
            glob: '*.md'
            run: |
              if command -v vale >/dev/null 2>&1 && test -f .vale.ini; then
                vale {staged_files} || { echo "↑ You touched these docs, so you own their prose errors — clear ALL of them (not just your edit). Tune severity in .vale.ini if a rule is wrong."; exit 1; }
              fi

          - name: reshape
            glob: '*.ts'
            run: node_modules/.bin/nodeve-check reshape {staged_files}

          - name: plural-arrays
            glob: '*.ts'
            run: node_modules/.bin/nodeve-check plural-arrays {staged_files}

          - name: page-size
            run: node_modules/.bin/nodeve-check page-size {staged_files}

          - name: file-size
            glob: '*.ts'
            run: node_modules/.bin/nodeve-check file-size {staged_files}

          # Whole-tree property — every manifest's deps must single-source from a
          # catalog. No-ops on repos without one, so it's safe to always run.
          - name: catalog
            glob: '**/package.json'
            run: node_modules/.bin/nodeve-check catalog

          # Whole-tree property — the workspace catalog must define the org-required
          # deps (remeda by default). No-ops where deps aren't configured.
          - name: require-deps
            glob: '{**/package.json,pnpm-workspace.yaml}'
            run: node_modules/.bin/nodeve-check require-deps

          # Whole-tree property — eslint is a hard org requirement, so a repo must
          # ship a root eslint flat config. Un-globbed: it's a repo-level fact, not
          # a staged-file one, and a config-less repo would never stage a file that
          # triggers a glob. No-ops (skip) where `requireEslint.enforce` is false.
          - name: require-eslint
            run: node_modules/.bin/nodeve-check require-eslint

          # Whole-tree relationships — scan the full configured scope, not just staged.
          - name: inline-dupes
            glob: '*.ts'
            run: node_modules/.bin/nodeve-check inline-dupes

          # Whole-tree property — structural copy-paste (jscpd). A clone is a
          # relationship between two places, so it scans the full configured scope
          # (it ignores {staged_files}). Deliberately UN-globbed: a trigger glob
          # would gate the job on staged file extensions, silently skipping the
          # scan on a commit that stages only a language the glob didn't list. The
          # languages it scans are owned by `clones.formats` in nodeve.checks.js,
          # so adding one there is all a repo needs. Cost: the scan fires on every
          # commit — cheap (jscpd is fast, exits 0 with no clones, runs in this
          # parallel group). jscpd is a hard dep; if it can't be resolved the check
          # FAILS loudly (a silently-skipped copy-paste gate is worse than none).
          - name: clones
            run: node_modules/.bin/nodeve-check clones

          - name: helper-collisions
            glob: '*.ts'
            run: node_modules/.bin/nodeve-check helper-collisions {staged_files}

          # eslint is a hard org requirement (see the `require-eslint` gate). The
          # org rule set — function naming, max-params, max-lines-per-function —
          # only bites where eslint actually runs, so it runs here, on the staged
          # code files, resolving each repo's own flat config. Not a `nodeve-check`:
          # it's eslint itself on node_modules/.bin. Repos opt individual rules
          # in/out through their eslint config, not by dropping this job.
          - name: eslint
            glob: '*.{ts,tsx,js,jsx,mjs,cjs,svelte}'
            run: node_modules/.bin/eslint {staged_files}

# The commit-msg hook fires after pre-commit, once a message exists. lefthook
# passes the message file path as `{1}`. The gate gives it Conventional-Commits
# structure and requires a body once the staged diff grows past the configured
# size (see `commitMsg` in nodeve.checks.js). Bypass with `git commit --no-verify`.
commit-msg:
  jobs:
    - name: commit-msg
      run: node_modules/.bin/nodeve-check commit-msg {1}
