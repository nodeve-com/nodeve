# @nodeve/checks — the org's Vale house rules (the prose engine of the gate), and
# the canonical severity wiring. The TS checks run through `nodeve-check`; prose
# runs through the `vale` binary. Both are the commit gate; this file is the Vale
# half.
#
# TWO jobs:
#   1. As a Vale PACKAGE: a consumer lists this dir in its own `Packages`, and
#      `vale sync` copies `styles/nodeve/` into the consumer's StylesPath. The
#      rule LOGIC (the `styles/nodeve/*.yml` files) is versioned here, one source
#      for every repo — bump @nodeve/checks to change a rule everywhere.
#   2. As the REFERENCE config: Vale does not inherit a package's severity block
#      into the consumer's run (a `.vale.ini` `[*.md]` section is per-repo), so a
#      consumer restates `BasedOnStyles` + the severities below. This file is the
#      block to copy — the shape a repo drops at its root, kept in sync here.
#
# Consumer `.vale.ini` (see README "Prose gate"):
#   StylesPath = styles
#   Packages   = write-good, proselint, node_modules/@nodeve/checks
#   [*.md]
#   BasedOnStyles = nodeve, write-good, proselint
#   ...the severity lines below...

StylesPath = styles
Packages = write-good, proselint

[*.md]
BasedOnStyles = nodeve, write-good, proselint

# BLOCK on fat. Vale fails a commit ONLY on `error`; warning/suggestion are
# advisory. Wordy phrases + weasel/filler words, plus the copula-padding the
# telegraphic house style strips: passive voice and existential "there is/are".
write-good.TooWordy = error
write-good.Weasel = error
write-good.Passive = error
write-good.ThereIs = error
proselint.Very = error

# Hedging: proselint's vague-language weasels + nodeve's deferred-decision hedges
# ("if wanted") — punting a call the doc should make.
proselint.Hedging = error
nodeve.Hedging = error

# Ephemeral state: words framing the doc's moment as transient ("uncommitted",
# "this session"). Docs persist past commit — these go stale on land.
nodeve.Ephemeral = error

# Narration: prose addressing a PRIOR version ("used to", "no longer", "RESOLVED",
# "correction:"). A doc is read fresh — history the reader never saw.
nodeve.Narration = error

# ADVISORY (shown, non-blocking).
nodeve.SentenceLength = warning
proselint.Cliches = warning
proselint.Annotations = warning

# OFF — false positives on technical docs: E-Prime flags every "to be" verb; So
# bans sentence-initial "So"; Typography rewrites hex like 0x1510 to the × symbol.
write-good.E-Prime = NO
write-good.So = NO
proselint.Typography = NO
