# Release via Changesets + npm Trusted Publishing (OIDC) — no stored npm token.
#
# On push to main:
#   - changesets pending  → open/refresh the "Version Packages" PR (bumps versions,
#                           writes CHANGELOGs, consumes .changeset/*.md).
#   - no changesets left  → run `pnpm release` (build + `changeset publish`), which
#                           publishes changed packages to npm.
#
# Auth is OIDC: `id-token: write` lets pnpm exchange a short-lived token with npm's
# registry (the repo/workflow must be registered as a Trusted Publisher on each
# package — done in the npmjs.org package settings). No NPM_TOKEN secret, nothing
# to expire — replaces the local `npm login && pnpm login` dance.
name: release

on:
  push:
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write # changesets pushes the version commit + tags, creates GH releases
  pull-requests: write # opens/updates the Version Packages PR
  id-token: write # OIDC token exchange for npm Trusted Publishing

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      # Check out with the RELEASE_PAT so the "Version Packages" branch/commit the changesets
      # action pushes is authored by the PAT identity, NOT the built-in GITHUB_TOKEN. GitHub
      # suppresses workflow runs on GITHUB_TOKEN-authored events (recursion guard), so a
      # GITHUB_TOKEN-merged Version PR would NOT re-trigger this workflow → nothing would publish.
      # A PAT-authored push/merge is a normal actor event and DOES re-trigger. (Fine-grained PAT,
      # this repo only, Contents + Pull requests: write. Stored as the RELEASE_PAT secret.)
      - uses: actions/checkout@v7
        with:
          token: ${{ secrets.RELEASE_PAT }}
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      # NB: do NOT upgrade global npm here. pnpm@11 performs the OIDC token exchange
      # itself; it does not shell out to npm. changesets' "is this version already
      # published?" check DOES use node-24's bundled npm (`npm info`) — forcing npm@12
      # broke that check (it reported every already-published package as unpublished,
      # triggering a doomed republish that crashed in isAlreadyPublishedError).

      - uses: changesets/action@v1
        id: changesets
        with:
          version: pnpm changeset version
          publish: pnpm release
        env:
          # PAT (not github.token) so the Version PR it opens is authored by the PAT identity —
          # required for the auto-merge below to re-trigger this workflow's publish run.
          GITHUB_TOKEN: ${{ secrets.RELEASE_PAT }}

      # Auto-merge the "Version Packages" PR. hasChangesets == 'true' means this run OPENED/updated
      # the PR (it did not publish); enabling auto-merge lands it once required checks pass, and the
      # PAT-authored merge re-triggers release.yml — which, with no changesets left, runs the publish
      # branch above. Needs "Allow auto-merge" enabled in repo Settings → General.
      - name: Auto-merge the Version Packages PR
        if: steps.changesets.outputs.hasChangesets == 'true' && steps.changesets.outputs.pullRequestNumber != ''
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
        run: gh pr merge "${{ steps.changesets.outputs.pullRequestNumber }}" --auto --squash

      # Bake the grimoire JSON artifacts (catalog entries, concept data trees, draft-07
      # schemas — NOT shipped in the npm tarball) and attach them to the release GH created
      # for the `@nodeve/grimoire@<v>` tag. Only when this run actually published grimoire.
      # `pnpm release` already ran `pnpm build`, so the codegen's workspace deps
      # (@nodeve/schema-case, encoding dist/) are present. Folded in here because a tag-
      # triggered workflow can't fire on CI releases — changesets tags with GITHUB_TOKEN,
      # and GitHub suppresses workflow triggers on GITHUB_TOKEN-authored events.
      - name: Attach grimoire JSON artifacts
        if: steps.changesets.outputs.published == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PUBLISHED: ${{ steps.changesets.outputs.publishedPackages }}
        run: |
          version=$(printf '%s' "$PUBLISHED" | jq -r '.[] | select(.name=="@nodeve/grimoire") | .version')
          if [ -z "$version" ]; then
            echo "grimoire not published in this release; skipping JSON artifacts."
            exit 0
          fi
          pnpm --filter @nodeve/grimoire generate
          tar -czf grimoire-json.tar.gz -C packages/grimoire artifacts
          gh release upload "@nodeve/grimoire@${version}" grimoire-json.tar.gz --clobber
