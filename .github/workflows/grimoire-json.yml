# On a @nodeve/grimoire release tag (pushed by `changeset publish` + `git push --tags`),
# bake the JSON artifacts (catalog entries, concept data trees, draft-07 schemas — not shipped
# in the npm package) and attach them to the tag's GitHub release as one tarball.
name: grimoire-json
on:
  push:
    tags:
      - '@nodeve/grimoire@*'
permissions:
  contents: write
jobs:
  attach-json:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # grimoire's codegen imports its workspace deps (@nodeve/schema-case, encoding) from their
      # built dist/ — build them (and any sibling) before baking.
      - run: pnpm -r --if-present build
      - run: pnpm --filter @nodeve/grimoire generate
      - run: tar -czf grimoire-json.tar.gz -C packages/grimoire artifacts
      - run: gh release create "$GITHUB_REF_NAME" --notes "JSON artifacts for $GITHUB_REF_NAME" grimoire-json.tar.gz
        env:
          GH_TOKEN: ${{ github.token }}
