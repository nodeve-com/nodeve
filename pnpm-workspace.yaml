packages:
  - 'packages/*'

# esbuild (via vitest) ships a postinstall; allow it to build its native binary.
allowBuilds:
  esbuild: true

# Single source of every third-party version — workspace packages reference these
# via the `catalog:` protocol, never a literal pin (enforced by nodeve-check-catalog).
# Peer ranges in @nodeve/config resolve from here too, so the published floor tracks
# what nodeve itself builds against.
catalog:
  '@ast-grep/napi': ^0.44.1
  '@eslint/compat': ^2.1.0
  '@eslint/js': ^10.0.1
  '@noble/hashes': ^2.0.0
  '@scure/base': ^2.0.0
  '@sinclair/typebox': ^0.34.50
  '@types/node': ^22.0.0
  '@types/pluralize': ^0.0.33
  '@vitest/browser-playwright': ^4.1.9
  ajv: ^8.17.1
  date-fns: ^4.0.0
  eslint: ^10.5.0
  eslint-config-prettier: ^10.1.8
  eslint-plugin-svelte: ^3.19.0
  globals: ^17.7.0
  js-tiktoken: ^1.0.0
  jscpd: ^5.0.0
  pluralize: ^8.0.0
  prettier: ^3.0.0
  prettier-plugin-svelte: ^3.5.1
  prettier-plugin-tailwindcss: ^0.7.2
  remeda: ^2.0.0
  remeda-humps: ^4.1.0
  ts-morph: ^28.0.0
  typescript: ^5.5.0
  typescript-eslint: ^8.62.0
  vitest: ^3.0.0
  yaml: ^2.5.0
