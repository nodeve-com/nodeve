packages:
  - "packages/*"

# esbuild (via vitest) ships a postinstall; allow it to build its native binary.
allowBuilds:
  esbuild: true

# Single source of every third-party version — workspace packages reference these
# via the `catalog:` protocol, never a literal pin (enforced by nodeve-check-catalog).
# Peer ranges in @nodeve/config resolve from here too, so the published floor tracks
# what nodeve itself builds against.
catalog:
  "@types/node": ^22.0.0
  js-tiktoken: ^1.0.0
  prettier: ^3.0.0
  prettier-plugin-svelte: ^3.5.1
  prettier-plugin-tailwindcss: ^0.7.2
  typescript: ^5.5.0
  vitest: ^3.0.0
  yaml: ^2.5.0
