# Git hooks via lefthook. Activate once per clone with `lefthook install` (the
# root `prepare` script does this on install). Bypass with `git commit --no-verify`.
#
# The pre-commit gate is the shared @nodeve/checks config — the same checks every
# org repo runs. Per-repo budgets/globs/allowlists live in `nodeve.checks.js`.
extends:
  - node_modules/@nodeve/checks/lefthook.checks.yml

# This repo IS the source of @nodeve/checks, but the gate runs the built `dist/`
# (the shared config is written for consumer repos, which only have the artifact).
# So a source edit to a check is invisible to its own commit until dist rebuilds.
# Rebuild it first, here, so the gate always reflects working-tree source — no one
# has to remember `pnpm build`. Kept local (not in the exported yml) so consumers,
# who have no src/, never see it.
pre-commit:
  piped: true
  jobs:
    - name: build-checks
      run: pnpm --filter @nodeve/checks build

    # grimoire's README promise made real: a commit touching grimoire regenerates src/generated/,
    # re-stages it, and runs the guards (incl. guard-generated-camel — NO snake on the TS surface).
    # Without this the guard only ran in `pnpm check`, and stale/snake generated files kept landing.
    - name: grimoire-generate
      glob: 'packages/grimoire/**'
      run: pnpm --filter @nodeve/grimoire generate && pnpm --filter @nodeve/grimoire guards
      stage_fixed: true
